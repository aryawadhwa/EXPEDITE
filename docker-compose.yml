version: '3.8'

services:
  backend:
    build: ./backend
    container_name: outbound-ai-backend
    restart: always
    env_file:
      - .env.prod
    ports:
      - "8000:8000"
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: outbound-ai-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  mongodb:
    image: mongo:latest
    container_name: outbound-ai-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo_data:
